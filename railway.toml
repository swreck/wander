[build]
builder = "nixpacks"

[build.nixpacks]
providers = ["node"]
build_cmd = "cd frontend && npm install --include=dev && npx vite build && mkdir -p ../backend/public && cp -r dist/* ../backend/public/ && cd ../backend && npm install --include=dev && npx prisma generate && npx tsc"

[deploy]
startCommand = "cd backend && node dist/index.js"
