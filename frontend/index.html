<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/wander-icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3a3128" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Wander</title>
    <style>
      html, body { margin: 0; padding: 0; background: #3a3128; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // One-time cleanup: unregister stale service workers that may be
      // serving old cached code and causing reload loops or broken JS.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
          if (regs.length > 0) location.reload();
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
